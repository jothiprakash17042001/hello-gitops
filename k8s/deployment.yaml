apiVersion: apps/v1
kind: Deployment

metadata:
  name: hello-gitops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: hello-gitops

  template:
    metadata:
      labels:
        app: hello-gitops

    spec:
      containers:
      - name: hello-gitops

        image: prakash123/hello-gitops:v1

        ports:
        - containerPort: 8000